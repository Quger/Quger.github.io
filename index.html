<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quger - Discord Bot Dev</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0010;
      --surface: rgba(120,60,200,0.08);
      --border: rgba(160,100,255,0.18);
      --accent: #a855f7;
      --accent2: #7c3aed;
      --glow: rgba(168,85,247,0.35);
      --text: #f0e8ff;
      --muted: #a89fc0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,58,237,0.2) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(168,85,247,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(109,40,217,0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      margin: auto;
      position: relative;
      z-index: 1;
      background: rgba(15,5,30,0.85);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 60px rgba(124,58,237,0.15),
        0 0 0 1px rgba(168,85,247,0.08) inset,
        0 30px 80px rgba(0,0,0,0.5);
      animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Avatar */
    .avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 1.25rem;
      animation: fadeUp 0.6s both;
    }

    .avatar-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #a855f7, #7c3aed, #c084fc, #a855f7);
      animation: spin 4s linear infinite;
      z-index: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-ring-inner {
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: var(--bg);
      z-index: 1;
    }

    .avatar {
      position: relative;
      z-index: 2;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    /* Status dot */
    .status {
      position: absolute;
      bottom: 6px;
      right: 6px;
      width: 16px;
      height: 16px;
      background: #22c55e;
      border-radius: 50%;
      border: 3px solid var(--bg);
      z-index: 3;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
      50% { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
    }

    /* Name & title */
    h1 {
      font-family: 'Manrope', sans-serif;
      font-size: 1.72rem;
      font-weight: 800;
      background: linear-gradient(135deg, #e9d5ff, #a855f7 50%, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
      animation: fadeUp 0.6s 0.1s both;
    }

    .title-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(168,85,247,0.15);
      border: 1px solid rgba(168,85,247,0.3);
      color: #c084fc;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 0.3rem 0.9rem;
      border-radius: 100px;
      margin-bottom: 1.1rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      animation: fadeUp 0.6s 0.15s both;
    }

    .title-badge::before { content: '⚙'; font-size: 0.85em; }

    /* Bio */
    .bio {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.65;
      margin-bottom: 1.8rem;
      padding: 0 0.5rem;
      animation: fadeUp 0.6s 0.2s both;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin-bottom: 1.5rem;
      animation: fadeUp 0.6s 0.25s both;
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      animation: fadeUp 0.6s 0.3s both;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.85rem 1.2rem;
      border-radius: 14px;
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      transition: all 0.22s cubic-bezier(.22,1,.36,1);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(168,85,247,0.12), rgba(124,58,237,0.08));
      opacity: 0;
      transition: opacity 0.22s;
    }

    .link-btn:hover {
      border-color: rgba(168,85,247,0.5);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(124,58,237,0.2);
    }

    .link-btn:hover::before { opacity: 1; }
    .link-btn:active { transform: translateY(0); }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .link-icon.discord { background: rgba(88,101,242,0.32); color: #ffffff; }
    .link-icon.site { background: rgba(34,197,94,0.18); color: #86efac; }
    .link-icon.telegram { background: rgba(39,167,231,0.16); color: #38bdf8; }
    .link-icon.boosty  { background: rgba(245,124,47,0.18); color: #ff9f63; }

    .link-icon svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      display: block;
    }

    
    .link-icon.discord svg {
      width: 24px;
      height: 24px;
    }

    .link-label {
      flex: 1;
      text-align: left;
    }

    .link-label span {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 400;
      margin-top: 0.05rem;
    }

    .link-arrow {
      color: var(--muted);
      font-size: 0.9rem;
      transition: transform 0.2s, color 0.2s;
    }

    .link-btn:hover .link-arrow {
      transform: translateX(3px);
      color: var(--accent);
    }

    /* Footer */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      border-top: 1px solid var(--border);
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      line-height: 1.8;
      width: 100%;
    }
    .footer-main {
      color: rgba(255,255,255,0.55);
      margin-bottom: 0.3rem;
    }
    .footer-disclaimer {
      color: rgba(255,255,255,0.9);
      font-weight: 500;
    }
    footer a {
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
    }
    footer a:hover { color: var(--accent); }
  
    @media (max-width: 480px) {
      .card { padding: 2rem 1.2rem; border-radius: 20px; }
      h1 { font-size: 1.4rem !important; }
      .avatar { width: 90px; height: 90px; }
    }
</style>
</head>
